<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AT · 3D Hero</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1a;color:#fff;font-family:'Pretendard',sans-serif;min-height:100vh;overflow-x:hidden;perspective:1200px}
.hero{height:80vh;position:relative;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at bottom,#1a1a3a 0%,#0f0f1a 60%)}
.orb{position:absolute;width:400px;height:400px;border-radius:50%;background:conic-gradient(from 0deg,#ff0080,#7a00ff,#00d4ff,#00ff80,#ff0080);filter:blur(0px);animation:rotate 20s linear infinite,morph 12s ease-in-out infinite;opacity:.7;z-index:1}
@keyframes rotate{to{transform:rotate(360deg)}}
@keyframes morph{0%,100%{border-radius:50%}50%{border-radius:30% 70% 70% 30%/40% 40% 60% 60%}}
.orb::before{content:'';position:absolute;inset:20px;background:#0f0f1a;border-radius:inherit}
.hero-content{position:relative;z-index:2;text-align:center}
.hero h1{font-size:clamp(56px,11vw,160px);font-weight:900;letter-spacing:-.04em;line-height:.9;background:linear-gradient(135deg,#fff,#c4b5fd);-webkit-background-clip:text;color:transparent}
.hero .sub{margin-top:16px;font-size:16px;color:#a78bfa;letter-spacing:.2em;text-transform:uppercase}
.wrap{max-width:1200px;margin:0 auto;padding:80px 24px 120px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;justify-content:center}
.chip{padding:8px 18px;background:rgba(255,255,255,.05);border:1px solid rgba(124,58,237,.4);color:#c4b5fd;font:inherit;font-size:13px;cursor:pointer;border-radius:99px}
.chip.on{background:#7c3aed;color:#fff;border-color:#7c3aed}
.section{font-size:15px;color:#a78bfa;text-transform:uppercase;letter-spacing:.15em;margin:48px 0 20px;font-weight:700;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;perspective:800px}
.card{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(236,72,153,.05));border:1px solid rgba(124,58,237,.3);border-radius:16px;padding:22px;text-decoration:none;color:#fff;display:block;transition:transform .4s,box-shadow .4s;transform-style:preserve-3d}
.card:hover{transform:rotateY(-8deg) rotateX(4deg) translateY(-6px);box-shadow:-20px 20px 40px rgba(124,58,237,.3)}
.row{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px}
.nm{font-size:22px;font-weight:700;letter-spacing:-.02em}
.by{font-size:11px;color:#a78bfa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.desc{font-size:14px;line-height:1.55;color:rgba(255,255,255,.85)}
.free{font-size:10px;padding:3px 9px;background:#7c3aed;border-radius:99px;font-weight:600}
.note{margin-top:10px;padding:9px 12px;background:rgba(167,139,250,.1);border-radius:8px;font-size:12px;color:#c4b5fd}</style></head><body>
<section class="hero"><div class="orb"></div><div class="hero-content"><h1>매일 쓰는<br>AI 도구</h1><div class="sub">한국에서 진짜 쓰는 도구 모음</div></div></section><div class="wrap"><div class="chips" id="chips"></div><div class="section">Curated · <span id="cn"></span></div><div class="grid" id="cur"></div><div class="section">Mine · <span id="mn"></span></div><div class="grid" id="mine"></div></div>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}</a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
