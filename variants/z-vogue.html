<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Z · Vogue Editorial</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf6f0;color:#1a1a1a;font-family:'Cormorant Garamond','Pretendard',serif}
.wrap{max-width:1200px;margin:0 auto;padding:60px 32px 120px}
header{text-align:center;border-bottom:1px solid #1a1a1a;padding-bottom:48px;margin-bottom:64px;position:relative}
.mast{font-family:'Playfair Display',serif;font-size:14px;letter-spacing:.5em;text-transform:uppercase;margin-bottom:24px}
h1{font-family:'Playfair Display',serif;font-size:clamp(72px,12vw,160px);font-weight:900;letter-spacing:-.04em;line-height:.85;font-style:italic}
h1 b{font-style:normal;font-weight:400}
.sub{font-size:22px;font-style:italic;margin-top:24px;color:#666;max-width:600px;margin-left:auto;margin-right:auto;line-height:1.4}
.chips{display:flex;justify-content:center;gap:32px;margin:32px 0;font-family:'Playfair Display',serif;font-size:13px;letter-spacing:.2em;text-transform:uppercase}
.chip{background:none;border:none;font:inherit;cursor:pointer;color:#666;padding:0;border-bottom:1px solid transparent;padding-bottom:4px}
.chip.on{color:#1a1a1a;border-bottom-color:#c8483a}
.section{font-family:'Playfair Display',serif;font-size:13px;letter-spacing:.4em;text-transform:uppercase;text-align:center;margin:64px 0 32px;border-top:1px solid #1a1a1a;padding-top:24px}
.grid{column-count:3;column-gap:32px}
.card{break-inside:avoid;margin-bottom:32px;text-decoration:none;color:#1a1a1a;display:block;padding-bottom:24px;border-bottom:1px solid rgba(26,26,26,.15)}
.card:hover .nm{color:#c8483a}
.kicker{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#c8483a;margin-bottom:8px}
.nm{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;letter-spacing:-.02em;line-height:1.05;margin-bottom:8px;font-style:italic;transition:color .2s}
.by{font-size:13px;font-style:italic;color:#888;margin-bottom:14px}
.desc{font-size:16px;line-height:1.5;color:#444}
.note{font-style:italic;color:#c8483a;font-size:15px;margin-top:10px;border-left:2px solid #c8483a;padding-left:12px}
@media(max-width:900px){.grid{column-count:2}}
@media(max-width:600px){.grid{column-count:1}}
</style></head><body>
<main class="wrap">
<header><div class="mast">Vogue · AI Edition · 二〇二六</div><h1><b>매일 쓰는</b><br><i>AI 도구</i></h1><p class="sub">"한국에서 실제로 많이 쓰는 도구와 직접 만든 작은 도구들."</p></header>
<div class="chips" id="chips"></div>
<div class="section">— Curated Collection · <span id="cn"></span> —</div>
<div class="grid" id="cur"></div>
<div class="section">— My Tools · <span id="mn"></span> —</div>
<div class="grid" id="mine"></div>
</main>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="kicker">${esc(t.by)} · ${esc(t.free)}</div><div class="nm">${esc(t.name)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}</a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script></body></html>
