<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AV · Horizontal Split</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#fafafa;color:#0a0a0a;font-family:'Pretendard',sans-serif;min-height:100vh;display:flex}
.left{width:45%;background:#0a0a0a;color:#fff;position:sticky;top:0;height:100vh;padding:64px 48px;display:flex;flex-direction:column;justify-content:space-between}
.kicker{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:#888}
.left h1{font-size:clamp(48px,6vw,96px);font-weight:700;letter-spacing:-.04em;line-height:.95}
.sub{font-size:18px;color:#bbb;max-width:380px;line-height:1.5}
.chips{display:flex;flex-direction:column;gap:8px}
.chip{padding:10px 0;background:transparent;border:none;border-top:1px solid #333;color:#888;font:inherit;font-size:14px;cursor:pointer;text-align:left;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.chip:last-child{border-bottom:1px solid #333}
.chip:hover{color:#fff}
.chip.on{color:#ffd60a}
.right{width:55%;padding:64px 48px 120px}
.section{font-size:13px;color:#666;text-transform:uppercase;letter-spacing:.15em;margin:0 0 24px;font-weight:700}
.section:not(:first-child){margin-top:64px}
.grid{display:flex;flex-direction:column;gap:0}
.card{padding:24px 0;border-bottom:1px solid #ddd;text-decoration:none;color:#0a0a0a;display:block;transition:padding .2s}
.card:hover{padding-left:12px}
.card:hover .nm{color:#c8483a}
.row{display:flex;justify-content:space-between;align-items:start;margin-bottom:4px}
.nm{font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1.1;transition:color .2s}
.by{font-size:12px;color:#888;margin-bottom:10px;font-weight:500}
.desc{font-size:15px;line-height:1.55;color:#444}
.free{font-size:11px;color:#888;font-weight:600;white-space:nowrap}
.note{margin-top:8px;font-size:13px;color:#c8483a;font-style:italic;border-left:2px solid #c8483a;padding-left:10px}
@media(max-width:900px){body{flex-direction:column}.left,.right{width:100%;position:static;height:auto}}</style></head><body>
<aside class="left"><div><div class="kicker">// 2026 Collection</div><h1 style="margin-top:40px">매일 쓰는<br>AI 도구</h1></div><p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들. 과장 없이, 기능 그대로.</p><div class="chips" id="chips"></div></aside>
<main class="right"><div class="section">Curated · <span id="cn"></span></div><div class="grid" id="cur"></div><div class="section">Mine · <span id="mn"></span></div><div class="grid" id="mine"></div></main>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}</a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
