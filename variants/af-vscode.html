<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AF · VSCode Editor</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1e1e1e;color:#d4d4d4;font-family:'Cascadia Code',Consolas,'Pretendard',monospace;font-size:13px;display:flex;min-height:100vh}
.side{width:48px;background:#333;border-right:1px solid #1e1e1e;flex-shrink:0;padding:8px 0;display:flex;flex-direction:column;gap:8px;align-items:center}
.side div{width:24px;height:24px;background:#858585;border-radius:4px;cursor:pointer}
.side div.on{background:#0e639c}
.exp{width:240px;background:#252526;padding:8px;border-right:1px solid #1e1e1e;flex-shrink:0;font-size:12px}
.exp h2{font-size:11px;text-transform:uppercase;color:#cccccc;padding:4px 8px;letter-spacing:.05em;font-weight:700}
.exp .f{padding:2px 8px;color:#cccccc;cursor:pointer}
.exp .f:hover{background:#2a2d2e}
.exp .f::before{content:'📁 '}
.tabs{display:flex;background:#2d2d30;border-bottom:1px solid #1e1e1e}
.tab{padding:8px 14px;background:#1e1e1e;color:#fff;font-size:12px;border-right:1px solid #2d2d30}
.tab.idle{background:#2d2d30;color:#969696}
.main{flex:1;display:flex;flex-direction:column}
.editor{padding:16px 0 80px;overflow-x:auto;flex:1}
.line{display:flex;padding:0 16px}
.ln{color:#858585;width:32px;text-align:right;margin-right:16px;flex-shrink:0;user-select:none}
header{padding:16px 48px}
h1{font-size:24px;font-weight:600;color:#dcdcaa}
h1::before{content:'// ';color:#6a9955}
.sub{color:#6a9955;margin-top:4px}
.sub::before{content:'/* '}
.sub::after{content:' */'}
.chips{display:flex;gap:4px;padding:0 48px;flex-wrap:wrap;margin:16px 0}
.chip{padding:3px 8px;background:#0e639c33;border:1px solid #0e639c;color:#9cdcfe;font:inherit;font-size:11px;cursor:pointer;border-radius:2px}
.chip.on{background:#0e639c;color:#fff}
.section{padding:0 48px;color:#c586c0;font-size:13px;margin:24px 0 8px}
.section::before{content:'function '}
.section::after{content:'() {'}
.grid{padding:0 48px;display:flex;flex-direction:column;gap:0}
.card{padding:6px 0;text-decoration:none;color:#d4d4d4;display:flex;gap:16px;align-items:baseline}
.card:hover{background:#2a2d2e}
.nm{color:#9cdcfe;font-weight:500}
.nm::before{content:'const '}
.nm::after{content:' = '}
.by{color:#ce9178}
.by::before{content:'"'}
.by::after{content:'"'}
.desc{color:#6a9955;font-size:12px;flex:1}
.desc::before{content:'// '}
.free{color:#dcdcaa;font-size:11px}
.note{display:none}</style></head><body>
<aside class="side"><div class="on"></div><div></div><div></div></aside>
<aside class="exp"><h2>EXPLORER</h2><div class="f">ai-tools-hub</div><div class="f" style="padding-left:24px">tools.json</div><div class="f" style="padding-left:24px">categories.json</div></aside>
<div class="main"><div class="tabs"><span class="tab">tools.html</span><span class="tab idle">tools.json</span></div><div class="editor"><header class=""><h1>매일 쓰는 AI 도구</h1><p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들.</p></header>
<div class="chips" id="chips"></div>
<div class="section">큐레이션 한 도구 · <span id="cn"></span></div>
<div class="grid" id="cur"></div>
<div class="section">내가 만든 도구 · <span id="mn"></span></div>
<div class="grid" id="mine"></div></div></div>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}</a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
