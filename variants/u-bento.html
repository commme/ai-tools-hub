<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>U · Apple Bento</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f7;color:#1d1d1f;font-family:'Pretendard',-apple-system,'SF Pro Display',sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:1280px;margin:0 auto;padding:80px 24px 120px}
header{text-align:center;margin-bottom:64px}
h1{font-size:clamp(48px,7vw,96px);font-weight:700;letter-spacing:-.04em;line-height:1.05;margin-bottom:20px}
h1 b{background:linear-gradient(135deg,#06f,#a06bff);-webkit-background-clip:text;color:transparent}
.sub{font-size:21px;color:#6e6e73;max-width:580px;margin:0 auto;font-weight:400}
.chips{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:48px 0}
.chip{padding:10px 20px;border-radius:980px;background:#fff;border:none;font:inherit;font-size:14px;font-weight:500;color:#1d1d1f;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.chip.on{background:#1d1d1f;color:#fff}
.bento{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;grid-auto-rows:minmax(120px,auto)}
.card{background:#fff;border-radius:24px;padding:28px;text-decoration:none;color:inherit;transition:transform .25s;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;position:relative}
.card:hover{transform:scale(1.015)}
.card.s1{grid-column:span 2;grid-row:span 2}
.card.s2{grid-column:span 2}
.card.s3{grid-column:span 3}
.card.s4{grid-column:span 4;background:linear-gradient(135deg,#000,#1a1a1a);color:#fff}
.nm{font-size:28px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px}
.s1 .nm{font-size:42px}
.s4 .nm{font-size:36px;background:linear-gradient(135deg,#fff,#a06bff);-webkit-background-clip:text;color:transparent}
.by{font-size:12px;color:#86868b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
.s4 .by{color:#86868b}
.desc{font-size:15px;line-height:1.5;color:#424245}
.s4 .desc{color:#a1a1a6}
.free{position:absolute;top:24px;right:24px;font-size:11px;color:#06f;font-weight:600}
.section{font-size:13px;font-weight:600;color:#86868b;text-transform:uppercase;letter-spacing:.1em;margin:64px 0 20px}
@media(max-width:900px){.bento{grid-template-columns:repeat(2,1fr)}.card.s1,.card.s2,.card.s3,.card.s4{grid-column:span 2;grid-row:span 1}}
</style></head><body>
<main class="wrap">
<header><h1>매일 쓰는<br><b>AI 도구</b></h1><p class="sub">한국에서 실제로 많이 쓰는 도구와 직접 만든 작은 도구들.</p></header>
<div class="chips" id="chips"></div>
<div class="section">큐레이션 한 도구 <span id="cn"></span></div>
<div class="bento" id="cur"></div>
<div class="section">내가 만든 도구 <span id="mn"></span></div>
<div class="bento" id="mine"></div>
</main>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
const sizes=['s1','s2','s3','s4','s2','s3','s2','s2'];
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'전체'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t,i){return `<a class="card ${sizes[i%sizes.length]}" href="${esc(t.url)}" target="_blank"><div><div class="nm">${esc(t.name)}</div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div></div><div class="free">${esc(t.free)} →</div></a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script></body></html>
