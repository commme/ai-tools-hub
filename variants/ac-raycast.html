<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AC · Raycast Launcher</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a1a;color:#fff;font-family:-apple-system,'Pretendard',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px}
.app{width:100%;max-width:680px;background:#262626;border:1px solid #3a3a3a;border-radius:12px;box-shadow:0 30px 80px rgba(0,0,0,.5);overflow:hidden}
header{padding:14px 20px;border-bottom:1px solid #3a3a3a;display:flex;align-items:center;gap:10px}
.search{flex:1;background:transparent;border:none;outline:none;color:#fff;font:inherit;font-size:16px}
.dot{width:8px;height:8px;background:#ff5f57;border-radius:50%}
.dot+.dot{background:#febc2e}.dot+.dot+.dot{background:#28c840}
h1{font-size:0;display:none}
.sub{display:none}
.chips{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid #3a3a3a;flex-wrap:wrap}
.chip{padding:4px 10px;background:#3a3a3a;border:none;border-radius:6px;color:#a0a0a0;font:inherit;font-size:12px;cursor:pointer}
.chip.on{background:#ff6363;color:#fff}
.section{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.05em;padding:12px 16px 4px}
.grid{display:flex;flex-direction:column}
.card{display:grid;grid-template-columns:32px 1fr auto;gap:12px;padding:8px 16px;text-decoration:none;color:#fff;align-items:center;border:none}
.card:hover{background:#ff6363;color:#fff}
.card::before{content:'';width:24px;height:24px;background:linear-gradient(135deg,#ff6363,#ff8e53);border-radius:6px;display:block}
.row{display:flex;flex-direction:column;min-width:0}
.nm{font-size:14px;font-weight:500}
.by{display:none}
.desc{font-size:12px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card:hover .desc{color:rgba(255,255,255,.8)}
.free{font-size:10px;padding:2px 6px;background:#3a3a3a;border-radius:4px;color:#a0a0a0}
.card:hover .free{background:rgba(0,0,0,.3);color:#fff}
.note{display:none}</style></head><body>
<div class="app"><header><span class="dot"></span><span class="dot"></span><span class="dot"></span><input class="search" placeholder="Search AI tools..." readonly></header><header class=""><h1>매일 쓰는 AI 도구</h1><p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들.</p></header>
<div class="chips" id="chips"></div>
<div class="section">큐레이션 한 도구 · <span id="cn"></span></div>
<div class="grid" id="cur"></div>
<div class="section">내가 만든 도구 · <span id="mn"></span></div>
<div class="grid" id="mine"></div></div>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><div class="desc">${esc(t.description)}</div></div><span class="free">${esc(t.free)}</span></a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
