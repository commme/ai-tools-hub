<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>V · Vercel Geist</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#000;font-family:'Geist','Pretendard',sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:1200px;margin:0 auto;padding:64px 24px 120px}
header{padding-bottom:48px;border-bottom:1px solid #eaeaea}
.kicker{font-family:'Geist Mono',monospace;font-size:12px;color:#666;margin-bottom:20px}
h1{font-size:clamp(40px,6vw,72px);font-weight:600;letter-spacing:-.04em;line-height:1.05}
.sub{margin-top:16px;color:#666;font-size:18px;max-width:600px;line-height:1.5}
.chips{display:flex;gap:6px;margin:32px 0;flex-wrap:wrap}
.chip{padding:6px 12px;border:1px solid #eaeaea;border-radius:6px;background:#fff;font:inherit;font-size:13px;cursor:pointer;color:#666}
.chip:hover{border-color:#000;color:#000}
.chip.on{background:#000;color:#fff;border-color:#000}
.section{font-family:'Geist Mono',monospace;font-size:13px;color:#666;margin:48px 0 16px;text-transform:uppercase;letter-spacing:.05em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:#eaeaea;border:1px solid #eaeaea;border-radius:8px;overflow:hidden}
.card{background:#fff;padding:24px;text-decoration:none;color:inherit;transition:background .15s;display:block}
.card:hover{background:#fafafa}
.row{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.nm{font-size:18px;font-weight:600;letter-spacing:-.01em}
.by{font-family:'Geist Mono',monospace;font-size:11px;color:#999;margin-bottom:14px}
.desc{font-size:14px;line-height:1.5;color:#444;margin-bottom:14px}
.free{font-family:'Geist Mono',monospace;font-size:11px;padding:2px 8px;border:1px solid #eaeaea;border-radius:4px;color:#666;white-space:nowrap}
.tags{display:flex;gap:6px;flex-wrap:wrap;font-family:'Geist Mono',monospace;font-size:10px;color:#999}
.tags span::before{content:'#'}
.note{font-size:12px;color:#0070f3;margin:8px 0;border-left:2px solid #0070f3;padding-left:10px}
</style></head><body>
<main class="wrap">
<header><div class="kicker">commme/ai-tools · v1.0</div><h1>매일 쓰는 AI 도구</h1><p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들. 과장 없이.</p></header>
<div class="chips" id="chips"></div>
<div class="section">큐레이션 한 도구 / <span id="cn"></span></div>
<div class="grid" id="cur"></div>
<div class="section">내가 만든 도구 / <span id="mn"></span></div>
<div class="grid" id="mine"></div>
</main>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'all'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}<div class="tags">${t.tags.map(x=>`<span>${esc(x)}</span>`).join('')}</div></a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script></body></html>
