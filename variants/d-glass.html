<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>D · 그라디언트 메시 글래스</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--ink:#1a1530;--mute:#6b6485;--card:rgba(255,255,255,.55);--border:rgba(255,255,255,.6)}
  html,body{background:#fff5f8;color:var(--ink);font-family:'Pretendard','Inter',sans-serif;min-height:100vh;overflow-x:hidden}
  .mesh{position:fixed;inset:-20%;z-index:0;filter:blur(80px);opacity:.85}
  .blob{position:absolute;border-radius:50%}
  .b1{width:55vw;height:55vw;left:-10%;top:-10%;background:radial-gradient(circle,#ffb3d4,transparent 70%);animation:f1 24s ease-in-out infinite}
  .b2{width:50vw;height:50vw;right:-5%;top:20%;background:radial-gradient(circle,#b8e0ff,transparent 70%);animation:f2 28s ease-in-out infinite}
  .b3{width:45vw;height:45vw;left:20%;bottom:-15%;background:radial-gradient(circle,#d6c2ff,transparent 70%);animation:f3 32s ease-in-out infinite}
  .b4{width:40vw;height:40vw;right:25%;bottom:-10%;background:radial-gradient(circle,#bff7e8,transparent 70%);animation:f4 26s ease-in-out infinite}
  @keyframes f1{0%,100%{transform:translate(0,0)}50%{transform:translate(8vw,12vh)}}
  @keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(-10vw,8vh)}}
  @keyframes f3{0%,100%{transform:translate(0,0)}50%{transform:translate(6vw,-10vh)}}
  @keyframes f4{0%,100%{transform:translate(0,0)}50%{transform:translate(-8vw,-6vh)}}
  .wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:80px 32px 120px}
  .pill{display:inline-block;padding:8px 16px;background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.05em;color:var(--ink);margin-bottom:28px}
  h1{font-size:clamp(48px,8vw,96px);font-weight:800;line-height:1;letter-spacing:-.04em;margin-bottom:20px}
  .sub{color:var(--mute);font-size:18px;max-width:560px;line-height:1.6;font-weight:500}
  .controls{display:flex;gap:10px;margin:48px 0 24px;flex-wrap:wrap}
  .chip{padding:11px 20px;background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:999px;color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;font-family:inherit}
  .chip:hover{transform:translateY(-2px);background:rgba(255,255,255,.75)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .n{opacity:.5;margin-left:6px;font-weight:500}
  .section-h{font-size:14px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--mute);margin:56px 0 20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
  .card{position:relative;padding:22px;background:var(--card);backdrop-filter:blur(20px) saturate(150%);border:1px solid var(--border);border-radius:24px;text-decoration:none;color:inherit;transition:all .3s cubic-bezier(.2,.8,.2,1);overflow:hidden;box-shadow:0 4px 24px rgba(106,60,180,.06)}
  .card:hover{transform:translateY(-4px);background:rgba(255,255,255,.78);box-shadow:0 16px 40px rgba(106,60,180,.12)}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .ic{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#ff9ec5,#a78bff);display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(167,139,255,.3)}
  .nm{font-size:18px;font-weight:700;letter-spacing:-.01em}
  .by{font-size:11.5px;color:var(--mute);font-weight:500;margin-top:2px}
  .desc{font-size:14px;color:#3d3654;line-height:1.55;margin-bottom:14px;font-weight:500}
  .note{font-size:13px;color:#5b3aa5;background:rgba(167,139,255,.12);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-weight:500;line-height:1.5}
  .note::before{content:'💭 '}
  .tags{display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:11px;padding:4px 10px;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.8);border-radius:999px;color:var(--mute);font-weight:500}
  .free{position:absolute;top:18px;right:18px;font-size:10.5px;font-weight:700;padding:4px 10px;background:rgba(26,21,48,.08);border-radius:999px;color:var(--ink)}
  .mine .ic{background:linear-gradient(135deg,#5fe6c4,#3a9eff)}
  .mine .ic{box-shadow:0 4px 12px rgba(58,158,255,.3)}
  footer{margin-top:80px;text-align:center;color:var(--mute);font-size:13px;font-weight:500}
</style>
</head>
<body>
<div class="mesh"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div></div>
<main class="wrap">
  <span class="pill">✨ AI TOOLS · 2026</span>
  <h1>매일 쓰는<br>AI 도구 모음</h1>
  <p class="sub">한국에서 실제로 많이 쓰는 도구와 직접 만든 작은 도구들. 과장 없이, 기능 그대로.</p>
  <div class="controls" id="chips"></div>
  <div class="section-h">큐레이션 한 도구 · <span id="c-count"></span></div>
  <div class="grid" id="curated"></div>
  <div class="section-h">내가 만든 도구 · <span id="m-count"></span></div>
  <div class="grid" id="mine"></div>
  <footer>commme · 2026</footer>
</main>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOOLS=[],CATS=[],filter='all';
async function load(){
  const [t,c]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);
  TOOLS=t.tools;CATS=c.categories;render();
}
function chips(){
  const all=[{id:'all',name:'전체',emoji:'✨'},...CATS];
  const counts={all:TOOLS.length};CATS.forEach(c=>counts[c.id]=TOOLS.filter(t=>t.category===c.id).length);
  document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===filter?'on':''}" data-id="${c.id}">${c.emoji} ${c.name}<span class="n">${counts[c.id]||0}</span></button>`).join('');
  document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{filter=b.dataset.id;render()});
}
function card(t){
  return `<a class="card ${t.is_mine?'mine':''}" href="${esc(t.url)}" target="_blank" rel="noopener">
    <span class="free">${esc(t.free)}</span>
    <div class="row"><div class="ic">${esc(t.name[0])}</div><div><div class="nm">${esc(t.name)}</div><div class="by">${esc(t.by)}</div></div></div>
    <div class="desc">${esc(t.description)}</div>
    ${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}
    <div class="tags">${t.tags.slice(0,4).map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>
  </a>`;
}
function render(){
  chips();
  const f=t=>filter==='all'||t.category===filter;
  const cur=TOOLS.filter(t=>!t.is_mine&&f(t));
  const mine=TOOLS.filter(t=>t.is_mine&&f(t));
  document.getElementById('curated').innerHTML=cur.map(card).join('');
  document.getElementById('mine').innerHTML=mine.map(card).join('');
  document.getElementById('c-count').textContent=cur.length;
  document.getElementById('m-count').textContent=mine.length;
}
load();
</script>
</body>
</html>
