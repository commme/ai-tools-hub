<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AD · Spotify Music</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:'Pretendard',sans-serif;min-height:100vh}
.wrap{background:linear-gradient(180deg,#1ed760 0%,#121212 25%);min-height:100vh;padding:60px 32px 120px}
.inner{max-width:1200px;margin:0 auto}
header{margin-bottom:48px}
.kicker{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
h1{font-size:clamp(56px,9vw,128px);font-weight:900;letter-spacing:-.04em;line-height:.95}
.sub{margin-top:18px;font-size:15px;color:rgba(255,255,255,.85);max-width:500px;font-weight:600}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:32px 0}
.chip{padding:6px 14px;border-radius:99px;background:#232323;border:none;color:#fff;font:inherit;font-size:13px;cursor:pointer;font-weight:600}
.chip.on{background:#fff;color:#000}
.section{font-size:24px;font-weight:700;letter-spacing:-.02em;margin:48px 0 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.card{background:#181818;border-radius:8px;padding:16px;text-decoration:none;color:#fff;transition:background .25s;display:block;position:relative}
.card:hover{background:#282828}
.cover{aspect-ratio:1;background:linear-gradient(135deg,#1ed760,#1db954);border-radius:6px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:900;color:#000}
.row{display:flex;justify-content:space-between;align-items:start;margin-bottom:4px}
.nm{font-size:16px;font-weight:700;letter-spacing:-.01em}
.by{font-size:13px;color:#a7a7a7;margin-bottom:6px}
.desc{font-size:12px;color:#a7a7a7;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.free{font-size:10px;padding:2px 7px;background:#1ed760;color:#000;border-radius:99px;font-weight:700;white-space:nowrap}
.note{display:none}</style></head><body>
<div class="wrap"><div class="inner"><header class=""><h1>매일 쓰는 AI 도구</h1><p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들.</p></header>
<div class="chips" id="chips"></div>
<div class="section">큐레이션 한 도구 · <span id="cn"></span></div>
<div class="grid" id="cur"></div>
<div class="section">내가 만든 도구 · <span id="mn"></span></div>
<div class="grid" id="mine"></div></div></div>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="cover">${esc(t.name[0])}</div><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div></a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
