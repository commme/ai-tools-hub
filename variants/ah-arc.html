<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AH · Arc Browser</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg,#fbcfe8 0%,#a5b4fc 50%,#67e8f9 100%);color:#1e293b;font-family:-apple-system,'Pretendard',sans-serif;min-height:100vh;padding:24px}
.app{max-width:1200px;margin:0 auto;background:rgba(255,255,255,.5);backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,.6);border-radius:24px;padding:32px;box-shadow:0 30px 80px rgba(0,0,0,.1)}
header{padding-bottom:24px;border-bottom:1px solid rgba(0,0,0,.08);margin-bottom:24px}
.url{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(255,255,255,.6);border-radius:99px;font-size:12px;color:#475569;margin-bottom:20px;border:1px solid rgba(255,255,255,.7)}
.url::before{content:'🔒'}
h1{font-size:clamp(40px,6vw,72px);font-weight:700;letter-spacing:-.04em;line-height:1.05;background:linear-gradient(135deg,#7c3aed,#ec4899,#0ea5e9);-webkit-background-clip:text;color:transparent}
.sub{margin-top:14px;font-size:17px;color:#475569;max-width:500px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:24px 0}
.chip{padding:6px 14px;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.7);border-radius:99px;font:inherit;font-size:13px;cursor:pointer;color:#1e293b;backdrop-filter:blur(10px)}
.chip.on{background:#1e293b;color:#fff;border-color:#1e293b}
.section{font-size:13px;color:#7c3aed;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin:32px 0 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.7);border-radius:18px;padding:20px;text-decoration:none;color:#1e293b;backdrop-filter:blur(10px);transition:transform .25s;display:block}
.card:hover{transform:translateY(-3px);background:rgba(255,255,255,.7)}
.row{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px}
.nm{font-size:18px;font-weight:700;letter-spacing:-.02em}
.by{font-size:11px;color:#7c3aed;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.desc{font-size:13px;line-height:1.5;color:#475569}
.free{font-size:10px;padding:3px 8px;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;border-radius:99px;font-weight:600}
.note{margin-top:8px;padding:8px 10px;background:rgba(124,58,237,.1);border-radius:8px;font-size:12px;color:#7c3aed}</style></head><body>
<div class="app"><div class="url">commme.github.io/ai-tools-hub</div><header class=""><h1>매일 쓰는 AI 도구</h1><p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들.</p></header>
<div class="chips" id="chips"></div>
<div class="section">큐레이션 한 도구 · <span id="cn"></span></div>
<div class="grid" id="cur"></div>
<div class="section">내가 만든 도구 · <span id="mn"></span></div>
<div class="grid" id="mine"></div></div>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}</a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
