<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AI · Deep Glassmorphism</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a1a;color:#fff;font-family:'Pretendard',sans-serif;min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 10%,#7c3aed 0%,transparent 50%),radial-gradient(circle at 80% 80%,#ec4899 0%,transparent 50%),radial-gradient(circle at 40% 60%,#0ea5e9 0%,transparent 50%);filter:blur(80px);opacity:.6;z-index:0}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:80px 24px 120px}
header{margin-bottom:48px}
h1{font-size:clamp(48px,8vw,96px);font-weight:700;letter-spacing:-.04em;line-height:1}
.sub{margin-top:18px;font-size:18px;color:rgba(255,255,255,.8);max-width:560px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:32px 0}
.chip{padding:8px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(20px);color:#fff;font:inherit;font-size:13px;cursor:pointer;border-radius:99px}
.chip.on{background:rgba(255,255,255,.95);color:#0a0a1a}
.section{font-size:14px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.1em;margin:48px 0 16px;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(40px) saturate(180%);border-radius:20px;padding:24px;text-decoration:none;color:#fff;transition:all .3s;display:block;box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
.card:hover{background:rgba(255,255,255,.08);transform:translateY(-3px);box-shadow:0 20px 40px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.15)}
.row{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px}
.nm{font-size:20px;font-weight:700;letter-spacing:-.02em}
.by{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.desc{font-size:14px;line-height:1.55;color:rgba(255,255,255,.85)}
.free{font-size:10px;padding:3px 9px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:99px;font-weight:600;backdrop-filter:blur(10px)}
.note{margin-top:10px;padding:10px;background:rgba(167,139,250,.15);border-radius:10px;font-size:12px;color:#c4b5fd;border:1px solid rgba(167,139,250,.2)}</style></head><body>
<div class="wrap"><header class=""><h1>매일 쓰는 AI 도구</h1><p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들.</p></header>
<div class="chips" id="chips"></div>
<div class="section">큐레이션 한 도구 · <span id="cn"></span></div>
<div class="grid" id="cur"></div>
<div class="section">내가 만든 도구 · <span id="mn"></span></div>
<div class="grid" id="mine"></div></div>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}</a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
