<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AU · Diagonal Split</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#fff;color:#0a0a0a;font-family:'Pretendard',sans-serif;min-height:100vh;overflow-x:hidden}
.hero{height:80vh;position:relative;overflow:hidden;background:#0a0a0a}
.hero::before{content:'';position:absolute;top:0;right:0;width:60%;height:100%;background:#ff3030;clip-path:polygon(20% 0,100% 0,100% 100%,0 100%)}
.hero::after{content:'';position:absolute;bottom:0;left:0;width:50%;height:60%;background:#ffd60a;clip-path:polygon(0 40%,80% 0,100% 100%,0 100%)}
.hero-content{position:relative;z-index:2;padding:80px 48px;height:100%;display:flex;flex-direction:column;justify-content:center;max-width:1200px;margin:0 auto}
.hero h1{font-size:clamp(60px,11vw,160px);font-weight:900;letter-spacing:-.05em;line-height:.85;color:#fff;mix-blend-mode:difference}
.hero .sub{margin-top:20px;font-size:18px;color:#fff;mix-blend-mode:difference;max-width:500px;font-weight:600}
.wrap{max-width:1200px;margin:0 auto;padding:80px 24px 120px}
.chips{display:flex;gap:0;flex-wrap:wrap;margin-bottom:32px;border:4px solid #0a0a0a}
.chip{padding:12px 20px;background:#fff;border:none;border-right:4px solid #0a0a0a;color:#0a0a0a;font:inherit;font-size:13px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:.08em}
.chip:last-child{border-right:none}
.chip.on{background:#ff3030;color:#fff}
.section{font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.2em;margin:48px 0 20px;padding-left:16px;border-left:8px solid #ff3030}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:0;border:4px solid #0a0a0a;border-bottom:none;border-right:none}
.card{padding:24px;border-right:4px solid #0a0a0a;border-bottom:4px solid #0a0a0a;text-decoration:none;color:#0a0a0a;display:block;background:#fff;position:relative;transition:background .15s}
.card:hover{background:#ffd60a}
.card:nth-child(3n)::before{content:'';position:absolute;top:0;right:0;width:0;height:0;border-left:40px solid transparent;border-top:40px solid #ff3030}
.row{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.nm{font-size:24px;font-weight:900;letter-spacing:-.02em;line-height:1.05}
.by{font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-weight:800;margin-bottom:12px;color:#666}
.desc{font-size:14px;line-height:1.5;font-weight:500}
.free{font-size:10px;padding:4px 9px;background:#0a0a0a;color:#fff;font-weight:800;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.note{margin-top:8px;padding:10px;background:#0a0a0a;color:#ffd60a;font-size:12px;font-weight:600}</style></head><body>
<section class="hero"><div class="hero-content"><h1>매일 쓰는<br>AI 도구.</h1><p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들.</p></div></section><div class="wrap"><div class="chips" id="chips"></div><div class="section">Curated · <span id="cn"></span></div><div class="grid" id="cur"></div><div class="section">Mine · <span id="mn"></span></div><div class="grid" id="mine"></div></div>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}</a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
