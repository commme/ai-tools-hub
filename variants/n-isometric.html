<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>N · 아이소메트릭</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1f2e;--card:#252b3d;--text:#e8ebf2;--mute:#7d85a0;--cyan:#5eead4;--pink:#fb7185;--amber:#fbbf24;--side:#191d2b;--top:#2f3650}
body{background:linear-gradient(180deg,#1a1f2e 0%,#0d1019 100%);color:var(--text);font-family:'Pretendard','Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(60deg,rgba(94,234,212,.04) 1px,transparent 1px),linear-gradient(-60deg,rgba(94,234,212,.04) 1px,transparent 1px);background-size:40px 70px;background-position:0 0;z-index:0}
.wrap{position:relative;z-index:1;max-width:1320px;margin:0 auto;padding:64px 28px 120px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:.3em;text-transform:uppercase;margin-bottom:18px}
h1{font-family:'Outfit',sans-serif;font-size:clamp(56px,9vw,108px);font-weight:900;line-height:.95;letter-spacing:-.04em;margin-bottom:20px;background:linear-gradient(180deg,#fff,var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--mute);font-size:17px;max-width:540px;line-height:1.6}
.controls{display:flex;gap:8px;margin:48px 0 32px;flex-wrap:wrap}
.chip{padding:10px 18px;background:var(--card);border:1px solid #353c54;color:var(--mute);font-size:13px;font-weight:600;cursor:pointer;border-radius:10px;font-family:inherit;transition:all .2s}
.chip:hover{color:var(--text);border-color:var(--cyan)}
.chip.on{background:var(--cyan);color:var(--bg);border-color:var(--cyan)}
.chip .n{margin-left:6px;opacity:.6;font-family:'JetBrains Mono',monospace;font-size:11px}
.section-h{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mute);letter-spacing:.3em;text-transform:uppercase;margin:64px 0 32px;display:flex;align-items:center;gap:14px}
.section-h::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,#353c54,transparent)}
.iso-wrap{padding:40px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:48px 28px;transform-style:preserve-3d}
.card{position:relative;padding:24px;background:var(--card);border-radius:14px;text-decoration:none;color:inherit;transform:rotateX(28deg) rotateZ(-15deg);transition:transform .3s cubic-bezier(.2,.8,.2,1);transform-style:preserve-3d;will-change:transform;display:block}
.card::before{content:"";position:absolute;inset:0;background:var(--side);border-radius:14px;transform:translateZ(-16px);box-shadow:0 0 0 1px rgba(0,0,0,.4)}
.card::after{content:"";position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,transparent,rgba(0,0,0,.2));pointer-events:none}
.card:hover{transform:rotateX(20deg) rotateZ(-10deg) translateZ(20px) scale(1.03)}
.card>*{position:relative;z-index:1}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
.nm{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.01em;line-height:1.15}
.by{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mute);margin-top:4px}
.free{font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:3px 9px;background:rgba(94,234,212,.15);color:var(--cyan);border-radius:6px;white-space:nowrap}
.desc{font-size:13.5px;color:#b6bdd1;line-height:1.55;margin-bottom:14px}
.note{font-family:'Outfit',sans-serif;font-size:13px;color:var(--amber);background:rgba(251,191,36,.08);padding:9px 12px;border-radius:8px;margin-bottom:14px;border-left:2px solid var(--amber)}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:3px 7px;background:#191d2b;border-radius:5px;color:var(--mute)}
.mine::before{background:#3a2a1a}
.mine .nm{color:var(--amber)}
footer{margin-top:80px;text-align:center;color:var(--mute);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase}
.hint{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mute);margin-top:18px;text-align:center;letter-spacing:.1em}
</style></head><body>
<main class="wrap">
<div class="eyebrow">// AI · TOOLS · ISOMETRIC</div>
<h1>매일 쓰는<br>AI 도구</h1>
<p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들. 30도로 기울인 큐브들.</p>
<div class="controls" id="chips"></div>
<div class="section-h">curated <span id="c-count"></span></div>
<div class="iso-wrap"><div class="grid" id="curated"></div></div>
<div class="section-h">made by me <span id="m-count"></span></div>
<div class="iso-wrap"><div class="grid" id="mine"></div></div>
<footer>commme · 2026</footer>
</main>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOOLS=[],CATS=[],filter='all';
async function load(){const[t,c]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);TOOLS=t.tools;CATS=c.categories;render()}
function chips(){const all=[{id:'all',name:'전체'},...CATS.map(c=>({id:c.id,name:c.name}))];const counts={all:TOOLS.length};CATS.forEach(c=>counts[c.id]=TOOLS.filter(t=>t.category===c.id).length);document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===filter?'on':''}" data-id="${c.id}">${c.name}<span class="n">${counts[c.id]||0}</span></button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{filter=b.dataset.id;render()})}
function card(t){return `<a class="card ${t.is_mine?'mine':''}" href="${esc(t.url)}" target="_blank" rel="noopener"><div class="row"><div><div class="nm">${esc(t.name)}</div><div class="by">${esc(t.by)}</div></div><span class="free">${esc(t.free)}</span></div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}<div class="tags">${t.tags.slice(0,4).map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div></a>`}
function render(){chips();const f=t=>filter==='all'||t.category===filter;const cur=TOOLS.filter(t=>!t.is_mine&&f(t));const mine=TOOLS.filter(t=>t.is_mine&&f(t));document.getElementById('curated').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mine.map(card).join('');document.getElementById('c-count').textContent=`(${cur.length})`;document.getElementById('m-count').textContent=`(${mine.length})`}
load();
</script></body></html>
