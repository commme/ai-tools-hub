<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>R · 만화책 패널</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bungee&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0a0a0a;--paper:#fffaf0;--red:#ff3b30;--blue:#1e88e5;--yellow:#ffd60a}
body{background:var(--paper);background-image:
  radial-gradient(circle,rgba(0,0,0,.18) 1.2px,transparent 1.2px);
  background-size:8px 8px;color:var(--ink);font-family:'Pretendard','Comic Neue',sans-serif;min-height:100vh}
.wrap{max-width:1320px;margin:0 auto;padding:48px 28px 120px}
.title-panel{background:var(--yellow);border:4px solid var(--ink);padding:40px;margin-bottom:40px;box-shadow:10px 10px 0 var(--ink);position:relative;transform:rotate(-1deg)}
.title-panel::before{content:"BOOM!";position:absolute;top:-30px;right:30px;font-family:'Bangers',cursive;font-size:48px;color:var(--red);-webkit-text-stroke:3px var(--ink);transform:rotate(8deg);text-shadow:4px 4px 0 var(--ink)}
.eyebrow{font-family:'Bungee',cursive;font-size:14px;letter-spacing:.15em;color:var(--ink);margin-bottom:12px;display:inline-block;background:var(--ink);color:var(--yellow);padding:4px 12px}
h1{font-family:'Bangers',cursive;font-size:clamp(56px,10vw,120px);font-weight:400;line-height:1;letter-spacing:.02em;-webkit-text-stroke:3px var(--ink);color:var(--paper);text-shadow:6px 6px 0 var(--ink),12px 12px 0 var(--red)}
.sub{color:var(--ink);font-size:16px;max-width:520px;line-height:1.5;font-weight:700;margin-top:16px;font-family:'Comic Neue',cursive}
.controls{display:flex;gap:8px;margin:32px 0 36px;flex-wrap:wrap}
.chip{padding:10px 18px;background:var(--paper);border:3px solid var(--ink);color:var(--ink);font-size:13px;font-weight:700;cursor:pointer;font-family:'Bungee',cursive;letter-spacing:.05em;text-transform:uppercase;box-shadow:4px 4px 0 var(--ink);transition:all .1s}
.chip:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}
.chip:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
.chip.on{background:var(--red);color:#fff}
.chip .n{margin-left:6px;opacity:.7;font-size:11px}
.section-h{font-family:'Bangers',cursive;font-size:48px;letter-spacing:.04em;color:var(--ink);margin:56px 0 24px;-webkit-text-stroke:1.5px var(--ink);background:var(--blue);color:var(--paper);padding:8px 24px;display:inline-block;border:4px solid var(--ink);box-shadow:6px 6px 0 var(--ink);transform:rotate(-.8deg)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;align-items:start}
.card{position:relative;padding:22px;background:var(--paper);border:3.5px solid var(--ink);text-decoration:none;color:var(--ink);display:block;box-shadow:6px 6px 0 var(--ink);transition:all .15s}
.card:nth-child(2n){background:#e8f4ff}
.card:nth-child(3n){background:#ffe8e8}
.card:nth-child(5n){background:#fff5d6}
.card:hover{transform:translate(-3px,-3px);box-shadow:9px 9px 0 var(--ink)}
.card:hover .pop{transform:rotate(-5deg) scale(1.15)}
.pop{position:absolute;top:-18px;right:-12px;background:var(--red);color:#fff;font-family:'Bangers',cursive;font-size:13px;padding:6px 14px;border:3px solid var(--ink);transform:rotate(-3deg);letter-spacing:.05em;z-index:2;box-shadow:3px 3px 0 var(--ink);transition:transform .2s;-webkit-text-stroke:.5px #fff}
.bubble{background:#fff;border:3px solid var(--ink);border-radius:24px;padding:14px 18px;margin:14px 0;position:relative;font-family:'Comic Neue',cursive;font-size:14px;font-weight:700;line-height:1.4}
.bubble::after{content:"";position:absolute;bottom:-14px;left:30px;width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:14px solid var(--ink)}
.bubble::before{content:"";position:absolute;bottom:-10px;left:33px;width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:11px solid #fff;z-index:1}
.row{margin-bottom:8px}
.nm{font-family:'Bangers',cursive;font-size:26px;letter-spacing:.02em;line-height:1.05;color:var(--ink)}
.by{font-family:'Bungee',cursive;font-size:11px;color:var(--ink);opacity:.7;margin-top:4px;letter-spacing:.05em}
.desc{font-family:'Comic Neue',cursive;font-size:14px;line-height:1.5;color:var(--ink);margin-bottom:12px;font-weight:700}
.note{background:var(--yellow);border:2.5px solid var(--ink);padding:10px 14px;font-family:'Comic Neue',cursive;font-weight:700;font-size:13.5px;color:var(--ink);margin-bottom:12px;line-height:1.4;transform:rotate(-.5deg)}
.note::before{content:"💭 "}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-family:'Bungee',cursive;font-size:10px;padding:3px 8px;background:var(--ink);color:var(--paper);letter-spacing:.05em}
.mine{background:#d6ffd9 !important}
.mine .pop{background:var(--blue)}
footer{margin-top:80px;text-align:center;font-family:'Bangers',cursive;font-size:32px;letter-spacing:.05em;color:var(--ink);-webkit-text-stroke:1px var(--ink);background:var(--yellow);padding:14px 40px;display:inline-block;border:4px solid var(--ink);box-shadow:6px 6px 0 var(--ink);transform:rotate(1deg)}
.foot-wrap{text-align:center;margin-top:80px}
</style></head><body>
<main class="wrap">
<div class="title-panel">
<span class="eyebrow">▸ ISSUE #2026</span>
<h1>AI 도구<br>대백과!</h1>
<p class="sub">한국에서 진짜 많이 쓰는 AI 도구 + 직접 만든 작은 도구들!! 만화책처럼 펼쳐봐 ⚡</p>
</div>
<div class="controls" id="chips"></div>
<div class="section-h">큐레이션 ★</div>
<div class="grid" id="curated"></div>
<div class="section-h">MY 도구 ♥</div>
<div class="grid" id="mine"></div>
<div class="foot-wrap"><footer>♥ commme · 2026 ★</footer></div>
</main>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOOLS=[],CATS=[],filter='all';
async function load(){const[t,c]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);TOOLS=t.tools;CATS=c.categories;render()}
function chips(){const all=[{id:'all',name:'all',emoji:'★'},...CATS];const counts={all:TOOLS.length};CATS.forEach(c=>counts[c.id]=TOOLS.filter(t=>t.category===c.id).length);document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===filter?'on':''}" data-id="${c.id}">${c.name}<span class="n">${counts[c.id]||0}</span></button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{filter=b.dataset.id;render()})}
function card(t){return `<a class="card ${t.is_mine?'mine':''}" href="${esc(t.url)}" target="_blank" rel="noopener"><span class="pop">${esc(t.free)}</span><div class="row"><div class="nm">${esc(t.name)}</div><div class="by">BY ${esc(t.by)}</div></div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="bubble">${esc(t.my_note)}</div>`:''}<div class="tags">${t.tags.slice(0,4).map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div></a>`}
function render(){chips();const f=t=>filter==='all'||t.category===filter;const cur=TOOLS.filter(t=>!t.is_mine&&f(t));const mine=TOOLS.filter(t=>t.is_mine&&f(t));document.getElementById('curated').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mine.map(card).join('')}
load();
</script></body></html>
