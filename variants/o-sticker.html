<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>O · 스티커 콜라주</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fef3e2;--ink:#2d1b0e;--mute:#8a6d4d;--tape:rgba(255,235,150,.7)}
body{background:var(--bg);background-image:
  radial-gradient(circle at 20% 30%,rgba(0,0,0,.025) 1px,transparent 1px),
  radial-gradient(circle at 80% 70%,rgba(0,0,0,.02) 1px,transparent 1px);
  background-size:40px 40px,30px 30px;color:var(--ink);font-family:'Pretendard','DM Sans',sans-serif;min-height:100vh}
.wrap{max-width:1320px;margin:0 auto;padding:48px 28px 120px;position:relative}
.header-card{display:inline-block;background:#fff;padding:32px 36px;border:1px solid #e0d0b5;box-shadow:6px 6px 0 rgba(0,0,0,.08);transform:rotate(-1.2deg);margin-bottom:48px;position:relative}
.header-card::before{content:"";position:absolute;top:-14px;left:60px;width:80px;height:24px;background:var(--tape);transform:rotate(-3deg);box-shadow:0 1px 2px rgba(0,0,0,.1)}
.header-card::after{content:"";position:absolute;top:-12px;right:50px;width:70px;height:22px;background:rgba(255,180,180,.7);transform:rotate(4deg);box-shadow:0 1px 2px rgba(0,0,0,.1)}
.handwrite{font-family:'Caveat',cursive;color:#c95a3a;font-size:24px;margin-bottom:8px;transform:rotate(-1deg);display:inline-block}
h1{font-size:clamp(40px,6vw,68px);font-weight:700;line-height:1.05;letter-spacing:-.02em;margin-bottom:14px}
.sub{color:var(--mute);font-size:15px;max-width:480px;line-height:1.6}
.controls{display:flex;gap:8px;margin:24px 0 32px;flex-wrap:wrap}
.chip{padding:8px 16px;background:#fff;border:1.5px solid var(--ink);color:var(--ink);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transform:rotate(-1deg);transition:all .15s;box-shadow:2px 2px 0 var(--ink)}
.chip:nth-child(2n){transform:rotate(1deg)}
.chip:nth-child(3n){transform:rotate(-2deg)}
.chip:hover{background:#ffeb3b}
.chip.on{background:var(--ink);color:#fff;box-shadow:2px 2px 0 #c95a3a}
.chip .n{margin-left:5px;opacity:.6;font-size:11px;font-weight:500}
.section-h{font-family:'Caveat',cursive;font-size:42px;font-weight:700;color:#c95a3a;margin:48px 0 28px;transform:rotate(-1deg);display:inline-block}
.section-h::after{content:" ✿"}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:24px}
.card{position:relative;padding:22px 22px 26px;background:#fff;border:1px solid #d8c8a8;text-decoration:none;color:inherit;display:block;box-shadow:4px 4px 0 rgba(0,0,0,.08);transition:transform .2s}
.card:nth-child(odd){transform:rotate(-1.5deg)}
.card:nth-child(even){transform:rotate(1.2deg)}
.card:nth-child(3n){transform:rotate(-.5deg)}
.card:nth-child(5n){transform:rotate(2deg)}
.card:hover{transform:rotate(0) scale(1.04);z-index:5;box-shadow:8px 8px 0 rgba(0,0,0,.15)}
.card::before{content:"";position:absolute;top:-12px;left:50%;width:64px;height:20px;background:var(--tape);transform:translateX(-50%) rotate(-2deg);box-shadow:0 1px 2px rgba(0,0,0,.08);z-index:2}
.card.mine::before{background:rgba(180,255,180,.7)}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px;margin-top:10px}
.nm{font-size:20px;font-weight:700;line-height:1.2;letter-spacing:-.01em}
.by{font-family:'Caveat',cursive;font-size:18px;color:var(--mute);margin-top:2px}
.by::before{content:"by "}
.free{font-size:11px;font-weight:700;padding:3px 8px;background:#ffeb3b;border:1px solid var(--ink);white-space:nowrap;transform:rotate(3deg);font-family:'DM Sans',sans-serif}
.desc{font-size:14px;line-height:1.6;color:#3d2814;margin-bottom:12px}
.note{font-family:'Caveat',cursive;font-size:18px;color:#c95a3a;padding:8px 0;border-top:2px dashed #d8c8a8;border-bottom:2px dashed #d8c8a8;margin-bottom:12px;line-height:1.4}
.note::before{content:"« "}
.note::after{content:" »"}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 7px;background:#f0e5d0;border:1px solid #d8c8a8;font-weight:500}
.tag::before{content:"#"}
.mine{background:#fffae8}
footer{margin-top:80px;padding:24px;background:#fff;display:inline-block;border:1px solid #e0d0b5;font-family:'Caveat',cursive;font-size:24px;color:var(--ink);transform:rotate(1deg);box-shadow:4px 4px 0 rgba(0,0,0,.08)}
</style></head><body>
<main class="wrap">
<div class="header-card">
<div class="handwrite">✦ AI tools collected ✦</div>
<h1>매일 쓰는<br>AI 도구 모음</h1>
<p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들. 과장 없이, 기능 그대로.</p>
</div>
<div class="controls" id="chips"></div>
<div class="section-h">큐레이션 한 도구 <span id="c-count" style="color:var(--mute);font-family:'DM Sans',sans-serif;font-size:18px"></span></div>
<div class="grid" id="curated"></div>
<div class="section-h">내가 만든 도구 <span id="m-count" style="color:var(--mute);font-family:'DM Sans',sans-serif;font-size:18px"></span></div>
<div class="grid" id="mine"></div>
<footer>♥ commme · 2026 ♥</footer>
</main>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOOLS=[],CATS=[],filter='all';
async function load(){const[t,c]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);TOOLS=t.tools;CATS=c.categories;render()}
function chips(){const all=[{id:'all',name:'all',emoji:'✦'},...CATS];const counts={all:TOOLS.length};CATS.forEach(c=>counts[c.id]=TOOLS.filter(t=>t.category===c.id).length);document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===filter?'on':''}" data-id="${c.id}">${c.emoji} ${c.name}<span class="n">${counts[c.id]||0}</span></button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{filter=b.dataset.id;render()})}
function card(t){return `<a class="card ${t.is_mine?'mine':''}" href="${esc(t.url)}" target="_blank" rel="noopener"><div class="row"><div><div class="nm">${esc(t.name)}</div><div class="by">${esc(t.by)}</div></div><span class="free">${esc(t.free)}</span></div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}<div class="tags">${t.tags.slice(0,4).map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div></a>`}
function render(){chips();const f=t=>filter==='all'||t.category===filter;const cur=TOOLS.filter(t=>!t.is_mine&&f(t));const mine=TOOLS.filter(t=>t.is_mine&&f(t));document.getElementById('curated').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mine.map(card).join('');document.getElementById('c-count').textContent=`(${cur.length})`;document.getElementById('m-count').textContent=`(${mine.length})`}
load();
</script></body></html>
