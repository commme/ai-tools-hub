<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AL · Memphis Pop</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#fff8e7;color:#1a1a1a;font-family:'Pretendard',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 15% 25%,#ff3b8b 8px,transparent 9px),radial-gradient(circle at 85% 70%,#ffd60a 10px,transparent 11px),radial-gradient(circle at 50% 90%,#06a77d 6px,transparent 7px);background-size:120px 120px,180px 180px,150px 150px;opacity:.4;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:60px 24px 120px}
header{margin-bottom:48px;text-align:center}
h1{font-size:clamp(56px,10vw,140px);font-weight:900;line-height:.95;letter-spacing:-.04em;color:#1a1a1a;display:inline-block;position:relative}
h1 b{background:#ffd60a;padding:0 12px;display:inline-block;transform:rotate(-3deg);box-shadow:6px 6px 0 #1a1a1a}
.sub{margin-top:24px;font-size:18px;font-weight:700;max-width:560px;margin-left:auto;margin-right:auto}
.chips{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:32px 0}
.chip{padding:8px 18px;background:#fff;border:3px solid #1a1a1a;color:#1a1a1a;font:inherit;font-size:14px;font-weight:800;cursor:pointer;border-radius:99px;box-shadow:3px 3px 0 #1a1a1a;text-transform:uppercase}
.chip.on{background:#ff3b8b;color:#fff}
.section{font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.15em;text-align:center;margin:48px 0 24px;color:#06a77d}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.card{background:#fff;border:3px solid #1a1a1a;border-radius:20px;padding:22px;text-decoration:none;color:#1a1a1a;display:block;box-shadow:6px 6px 0 #1a1a1a;transition:transform .15s}
.card:nth-child(3n){background:#ffd60a}
.card:nth-child(3n+1){background:#ff3b8b;color:#fff}
.card:nth-child(3n+2){background:#06a77d;color:#fff}
.card:hover{transform:translate(-3px,-3px);box-shadow:9px 9px 0 #1a1a1a}
.row{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.nm{font-size:24px;font-weight:900;letter-spacing:-.02em;line-height:1.05}
.by{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;opacity:.7}
.desc{font-size:14px;line-height:1.5;font-weight:600}
.free{font-size:10px;padding:4px 9px;background:#1a1a1a;color:#fff;border-radius:99px;font-weight:800;text-transform:uppercase;white-space:nowrap}
.note{margin-top:8px;padding:8px 10px;background:rgba(255,255,255,.4);border-radius:8px;font-size:12px;font-weight:600}</style></head><body>
<div class="wrap"><header><h1>매일 쓰는<br><b>AI 도구</b></h1><p class="sub">한국에서 진짜로 매일 쓰는 도구 + 직접 만든 것들</p></header><div class="chips" id="chips"></div><div class="section">★ Curated · <span id="cn"></span> ★</div><div class="grid" id="cur"></div><div class="section">★ Mine · <span id="mn"></span> ★</div><div class="grid" id="mine"></div></div>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}</a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
