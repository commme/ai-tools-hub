<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AW · Sticky Section</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#fff;color:#0a0a0a;font-family:'Pretendard',sans-serif;min-height:100vh}
.wrap{max-width:1300px;margin:0 auto;padding:40px 32px 120px;display:grid;grid-template-columns:280px 1fr;gap:48px}
aside{position:sticky;top:40px;height:fit-content;align-self:start}
aside h1{font-size:clamp(40px,5vw,64px);font-weight:700;letter-spacing:-.03em;line-height:1}
.sub{margin-top:16px;font-size:15px;color:#666;line-height:1.5}
.chips{margin-top:32px;display:flex;flex-direction:column;gap:2px;border-left:2px solid #eee}
.chip{padding:10px 16px;background:transparent;border:none;color:#888;font:inherit;font-size:14px;cursor:pointer;text-align:left;font-weight:500;border-left:2px solid transparent;margin-left:-2px;transition:all .15s}
.chip:hover{color:#0a0a0a}
.chip.on{border-left-color:#0a0a0a;color:#0a0a0a;font-weight:700;background:#f5f5f5}
main{min-width:0}
.section{font-size:13px;color:#666;text-transform:uppercase;letter-spacing:.15em;margin:0 0 20px;font-weight:700;padding-bottom:12px;border-bottom:2px solid #0a0a0a}
.section:not(:first-child){margin-top:64px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{padding:20px;border:1px solid #eee;border-radius:12px;text-decoration:none;color:#0a0a0a;display:block;transition:all .2s}
.card:hover{border-color:#0a0a0a;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
.row{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px}
.nm{font-size:20px;font-weight:700;letter-spacing:-.02em}
.by{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:600}
.desc{font-size:14px;line-height:1.55;color:#444}
.free{font-size:10px;padding:3px 8px;background:#f0f0f0;color:#444;border-radius:4px;font-weight:600;white-space:nowrap}
.note{margin-top:8px;padding:8px 10px;background:#fffacc;border-radius:6px;font-size:12px;color:#666}
@media(max-width:900px){.wrap{grid-template-columns:1fr}aside{position:static}}</style></head><body>
<div class="wrap"><aside><h1>매일 쓰는<br>AI 도구</h1><p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들.</p><div class="chips" id="chips"></div></aside><main><div class="section">Curated · <span id="cn"></span></div><div class="grid" id="cur"></div><div class="section">Mine · <span id="mn"></span></div><div class="grid" id="mine"></div></main></div>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}</a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
