<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AQ · Marquee Motion</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f1e8;color:#1a1a1a;font-family:'Pretendard',sans-serif;min-height:100vh;overflow-x:hidden}
.wrap{max-width:1400px;margin:0 auto;padding:40px 24px 120px}
header{margin-bottom:32px}
.strip{background:#1a1a1a;color:#fff;padding:16px 0;margin:-40px -24px 32px;overflow:hidden;white-space:nowrap;border-top:3px solid #1a1a1a;border-bottom:3px solid #1a1a1a}
.strip-inner{display:inline-block;animation:scroll 20s linear infinite;font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.strip-inner span{margin:0 32px}
.strip-inner span:nth-child(2n){color:#ffd60a}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
h1{font-size:clamp(60px,10vw,140px);font-weight:900;letter-spacing:-.04em;line-height:.9}
.sub{margin-top:20px;font-size:18px;font-weight:600;max-width:560px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:32px 0}
.chip{padding:10px 18px;background:#1a1a1a;color:#fff;border:none;font:inherit;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.08em}
.chip.on{background:#ffd60a;color:#1a1a1a}
.section{font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.2em;margin:48px 0 20px;border-top:3px solid #1a1a1a;border-bottom:3px solid #1a1a1a;padding:12px 0;position:relative;overflow:hidden}
.section::before{content:'◆◆◆';position:absolute;left:0;top:50%;transform:translateY(-50%);animation:slide 4s linear infinite;color:#ff3030}
@keyframes slide{from{left:-10%}to{left:110%}}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:0;border:3px solid #1a1a1a;border-right:none;border-bottom:none}
.card{padding:22px;border-right:3px solid #1a1a1a;border-bottom:3px solid #1a1a1a;text-decoration:none;color:#1a1a1a;display:block;background:#fff;position:relative;overflow:hidden}
.card:hover{background:#ffd60a}
.card::after{content:'→';position:absolute;right:-30px;top:50%;transform:translateY(-50%);font-size:60px;font-weight:900;color:#1a1a1a;transition:right .3s}
.card:hover::after{right:20px}
.row{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px}
.nm{font-size:22px;font-weight:900;letter-spacing:-.02em;line-height:1.05}
.by{font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:12px;color:#666}
.desc{font-size:14px;line-height:1.5;font-weight:500}
.free{font-size:10px;padding:3px 8px;background:#1a1a1a;color:#ffd60a;font-weight:700;text-transform:uppercase}
.note{display:none}</style></head><body>
<div class="wrap"><div class="strip"><div class="strip-inner"><span>◆ AI TOOLS 2026 ◆</span><span>★ 한국 매일 쓰는 도구 ★</span><span>◆ AI TOOLS 2026 ◆</span><span>★ 한국 매일 쓰는 도구 ★</span><span>◆ AI TOOLS 2026 ◆</span><span>★ 한국 매일 쓰는 도구 ★</span></div></div><header><h1>매일 쓰는 AI 도구</h1><p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들.</p></header>
<div class="chips" id="chips"></div>
<div class="section">Curated · <span id="cn"></span></div>
<div class="grid" id="cur"></div>
<div class="section">Mine · <span id="mn"></span></div>
<div class="grid" id="mine"></div></div>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}</a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
