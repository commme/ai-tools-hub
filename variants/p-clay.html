<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>P · 클레이모피즘</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#e8eaf2;--text:#3a3650;--mute:#8a86a8;--p:#a78bff;--g:#7ce0c4;--y:#ffd270;--r:#ff8fa3}
body{background:linear-gradient(135deg,#eef0f8 0%,#e0e4f0 100%);color:var(--text);font-family:'Pretendard','Quicksand',sans-serif;min-height:100vh}
.wrap{max-width:1280px;margin:0 auto;padding:64px 32px 120px}
.eyebrow{display:inline-block;padding:10px 22px;background:var(--bg);border-radius:999px;color:var(--p);font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-bottom:24px;
  box-shadow:inset 4px 4px 8px #c9cce0,inset -4px -4px 8px #ffffff}
h1{font-family:'Quicksand',sans-serif;font-size:clamp(48px,8vw,96px);font-weight:700;line-height:1;letter-spacing:-.03em;margin-bottom:18px;color:var(--text)}
h1 span{color:var(--p)}
.sub{color:var(--mute);font-size:17px;max-width:540px;line-height:1.6;font-weight:500}
.controls{display:flex;gap:12px;margin:48px 0 36px;flex-wrap:wrap}
.chip{padding:12px 20px;background:var(--bg);border:none;color:var(--mute);font-size:13px;font-weight:700;cursor:pointer;border-radius:18px;font-family:inherit;transition:all .25s;
  box-shadow:6px 6px 12px #c9cce0,-6px -6px 12px #ffffff}
.chip:hover{color:var(--text);transform:translateY(-1px)}
.chip:active{box-shadow:inset 4px 4px 8px #c9cce0,inset -4px -4px 8px #ffffff}
.chip.on{color:#fff;background:linear-gradient(135deg,var(--p),#8b6bff);box-shadow:6px 6px 12px rgba(167,139,255,.4),-3px -3px 8px #ffffff}
.chip .n{margin-left:6px;opacity:.7;font-weight:500;font-size:11px}
.section-h{font-family:'Quicksand',sans-serif;font-size:24px;font-weight:700;margin:64px 0 24px;color:var(--text);display:flex;align-items:center;gap:14px}
.section-h .badge{font-size:13px;color:var(--p);background:var(--bg);padding:6px 14px;border-radius:999px;box-shadow:inset 3px 3px 6px #c9cce0,inset -3px -3px 6px #ffffff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:32px}
.card{position:relative;padding:28px;background:var(--bg);border-radius:32px;text-decoration:none;color:inherit;transition:all .3s cubic-bezier(.2,.8,.2,1);
  box-shadow:14px 14px 28px #c9cce0,-14px -14px 28px #ffffff}
.card:hover{transform:translateY(-4px);box-shadow:18px 18px 36px #c9cce0,-12px -12px 24px #ffffff}
.row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.ic{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--p),#8b6bff);display:grid;place-items:center;color:#fff;font-weight:700;font-size:22px;
  box-shadow:6px 6px 12px rgba(167,139,255,.4),inset -3px -3px 6px rgba(0,0,0,.15),inset 3px 3px 6px rgba(255,255,255,.3);flex-shrink:0}
.cat-image .ic{background:linear-gradient(135deg,var(--r),#ff5f7e);box-shadow:6px 6px 12px rgba(255,143,163,.4),inset -3px -3px 6px rgba(0,0,0,.15),inset 3px 3px 6px rgba(255,255,255,.3)}
.cat-video .ic{background:linear-gradient(135deg,#7eb6ff,#5290ff);box-shadow:6px 6px 12px rgba(126,182,255,.4),inset -3px -3px 6px rgba(0,0,0,.15),inset 3px 3px 6px rgba(255,255,255,.3)}
.cat-audio .ic{background:linear-gradient(135deg,var(--y),#ffb340);box-shadow:6px 6px 12px rgba(255,210,112,.4),inset -3px -3px 6px rgba(0,0,0,.15),inset 3px 3px 6px rgba(255,255,255,.3)}
.cat-coding .ic{background:linear-gradient(135deg,var(--g),#5dc4a6);box-shadow:6px 6px 12px rgba(124,224,196,.4),inset -3px -3px 6px rgba(0,0,0,.15),inset 3px 3px 6px rgba(255,255,255,.3)}
.cat-research .ic{background:linear-gradient(135deg,#9eb8ff,#7e9cff)}
.cat-design .ic{background:linear-gradient(135deg,#ffadd6,#ff7eb8)}
.cat-productivity .ic{background:linear-gradient(135deg,#a8e8d4,#74d4b6)}
.nm{font-family:'Quicksand',sans-serif;font-size:19px;font-weight:700;letter-spacing:-.01em}
.by{font-size:12.5px;color:var(--mute);margin-top:3px;font-weight:500}
.free{position:absolute;top:22px;right:22px;font-size:11px;font-weight:700;padding:5px 12px;background:var(--bg);color:var(--text);border-radius:999px;box-shadow:inset 3px 3px 6px #c9cce0,inset -3px -3px 6px #ffffff}
.desc{font-size:14px;color:#5a566f;line-height:1.6;margin-bottom:14px;font-weight:500}
.note{font-size:13.5px;color:var(--p);background:var(--bg);padding:12px 16px;border-radius:14px;margin-bottom:14px;font-weight:500;
  box-shadow:inset 3px 3px 6px #c9cce0,inset -3px -3px 6px #ffffff;line-height:1.5}
.note::before{content:"💭 "}
.tags{display:flex;gap:7px;flex-wrap:wrap}
.tag{font-size:11px;padding:5px 11px;background:var(--bg);border-radius:999px;color:var(--mute);font-weight:600;
  box-shadow:inset 2px 2px 4px #c9cce0,inset -2px -2px 4px #ffffff}
.mine{box-shadow:14px 14px 28px #d4cea0,-14px -14px 28px #ffffff;background:#fff8e0}
footer{margin-top:80px;padding:24px 32px;background:var(--bg);border-radius:24px;text-align:center;color:var(--mute);font-size:13px;font-weight:600;display:inline-block;
  box-shadow:inset 4px 4px 8px #c9cce0,inset -4px -4px 8px #ffffff}
</style></head><body>
<main class="wrap">
<span class="eyebrow">✨ AI Tools · 2026</span>
<h1>매일 쓰는<br><span>AI 도구</span> 모음</h1>
<p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들. 부드럽게 다듬어 모았어요.</p>
<div class="controls" id="chips"></div>
<div class="section-h">큐레이션 한 도구 <span class="badge" id="c-count"></span></div>
<div class="grid" id="curated"></div>
<div class="section-h">내가 만든 도구 <span class="badge" id="m-count"></span></div>
<div class="grid" id="mine"></div>
<div style="text-align:center;margin-top:60px"><footer>commme · 2026</footer></div>
</main>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOOLS=[],CATS=[],filter='all';
async function load(){const[t,c]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);TOOLS=t.tools;CATS=c.categories;render()}
function chips(){const all=[{id:'all',name:'전체',emoji:'✨'},...CATS];const counts={all:TOOLS.length};CATS.forEach(c=>counts[c.id]=TOOLS.filter(t=>t.category===c.id).length);document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===filter?'on':''}" data-id="${c.id}">${c.emoji} ${c.name}<span class="n">${counts[c.id]||0}</span></button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{filter=b.dataset.id;render()})}
function card(t){return `<a class="card cat-${t.category} ${t.is_mine?'mine':''}" href="${esc(t.url)}" target="_blank" rel="noopener"><span class="free">${esc(t.free)}</span><div class="row"><div class="ic">${esc(t.name[0])}</div><div><div class="nm">${esc(t.name)}</div><div class="by">${esc(t.by)}</div></div></div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}<div class="tags">${t.tags.slice(0,4).map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div></a>`}
function render(){chips();const f=t=>filter==='all'||t.category===filter;const cur=TOOLS.filter(t=>!t.is_mine&&f(t));const mine=TOOLS.filter(t=>t.is_mine&&f(t));document.getElementById('curated').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mine.map(card).join('');document.getElementById('c-count').textContent=cur.length;document.getElementById('m-count').textContent=mine.length}
load();
</script></body></html>
