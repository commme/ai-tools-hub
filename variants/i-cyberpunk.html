<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>I · 사이버펑크</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06010a;--pink:#ff006e;--cyan:#00f0ff;--yellow:#ffe600;--text:#e0d8ff;--mute:#7d6e9e;--card:rgba(20,5,40,.6)}
body{background:var(--bg);color:var(--text);font-family:'Pretendard','Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:
  radial-gradient(circle at 20% 10%,rgba(255,0,110,.18),transparent 50%),
  radial-gradient(circle at 80% 90%,rgba(0,240,255,.18),transparent 50%);z-index:0}
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(transparent 0,transparent 2px,rgba(0,240,255,.025) 2px,rgba(0,240,255,.025) 4px);pointer-events:none;z-index:1}
.wrap{position:relative;z-index:2;max-width:1320px;margin:0 auto;padding:48px 24px 120px}
.bar{display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:.2em;margin-bottom:32px;border-bottom:1px solid rgba(0,240,255,.3);padding-bottom:14px}
.bar .pulse{color:var(--pink);animation:blink 1.5s steps(2) infinite}
@keyframes blink{50%{opacity:.3}}
.jp{font-family:'Noto Sans JP',sans-serif;color:var(--pink);font-size:14px;letter-spacing:.5em;margin-bottom:8px;font-weight:300}
h1{font-family:'Orbitron',sans-serif;font-size:clamp(48px,9vw,110px);font-weight:900;line-height:.95;letter-spacing:-.02em;text-transform:uppercase;color:var(--text);position:relative;display:inline-block;margin-bottom:20px}
h1::before,h1::after{content:attr(data-text);position:absolute;left:0;top:0;width:100%;mix-blend-mode:screen}
h1::before{color:var(--pink);transform:translate(-3px,0);clip-path:polygon(0 20%,100% 20%,100% 50%,0 50%)}
h1::after{color:var(--cyan);transform:translate(3px,0);clip-path:polygon(0 60%,100% 60%,100% 90%,0 90%)}
.sub{color:var(--mute);font-family:'Share Tech Mono',monospace;font-size:14px;max-width:560px;line-height:1.6;letter-spacing:.05em}
.sub::before{content:"// ";color:var(--cyan)}
.controls{display:flex;gap:6px;margin:40px 0 24px;flex-wrap:wrap}
.chip{padding:8px 14px;background:transparent;border:1px solid rgba(0,240,255,.3);color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)}
.chip:hover{background:rgba(0,240,255,.1);color:var(--text)}
.chip.on{background:var(--pink);color:var(--bg);border-color:var(--pink);font-weight:700}
.chip .n{margin-left:6px;opacity:.6}
.section-h{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--pink);text-transform:uppercase;letter-spacing:.3em;margin:48px 0 16px;padding:8px 14px;background:linear-gradient(90deg,rgba(255,0,110,.15),transparent);border-left:3px solid var(--pink)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.card{position:relative;padding:18px;background:var(--card);border:1px solid rgba(0,240,255,.2);text-decoration:none;color:inherit;transition:all .2s;backdrop-filter:blur(10px);clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px)}
.card:hover{border-color:var(--pink);background:rgba(40,5,80,.7);transform:translateY(-2px)}
.card::before{content:"";position:absolute;top:0;left:12px;right:0;height:1px;background:linear-gradient(90deg,var(--cyan),transparent)}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
.nm{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:-.01em}
.by{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--mute);margin-top:4px;letter-spacing:.1em}
.by::before{content:"// "}
.free{font-family:'Share Tech Mono',monospace;font-size:10.5px;padding:2px 8px;background:var(--yellow);color:var(--bg);font-weight:700;letter-spacing:.1em;white-space:nowrap;text-transform:uppercase}
.desc{font-family:'Pretendard',sans-serif;font-size:13.5px;color:#c4b8e0;line-height:1.55;margin-bottom:12px}
.note{font-family:'Share Tech Mono',monospace;font-size:12.5px;color:var(--cyan);background:rgba(0,240,255,.08);padding:8px 11px;border-left:2px solid var(--cyan);margin-bottom:12px;letter-spacing:.03em}
.note::before{content:"➤ "}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-family:'Share Tech Mono',monospace;font-size:10.5px;color:var(--pink);padding:2px 6px;border:1px solid rgba(255,0,110,.3);letter-spacing:.05em}
.mine{border-color:rgba(255,230,0,.4)}
.mine .nm{color:var(--yellow)}
footer{margin-top:80px;padding-top:24px;border-top:1px solid rgba(0,240,255,.2);text-align:center;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--mute);letter-spacing:.3em;text-transform:uppercase}
</style></head><body>
<main class="wrap">
<div class="bar"><span>SYS::AI-TOOLS//2026.04 ▸ COMMME.LINK</span><span class="pulse">● LIVE</span></div>
<div class="jp">エーアイ・ツール</div>
<h1 data-text="AI TOOLS">AI TOOLS</h1>
<p class="sub">한국에서 실제로 많이 쓰는 AI 도구 + 직접 만든 작은 도구들. 과장 없이, 기능 그대로.</p>
<div class="controls" id="chips"></div>
<div class="section-h">▸ CURATED <span id="c-count"></span></div>
<div class="grid" id="curated"></div>
<div class="section-h">▸ MADE BY ME <span id="m-count"></span></div>
<div class="grid" id="mine"></div>
<footer>END · OF · TRANSMISSION ── COMMME · 2026</footer>
</main>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOOLS=[],CATS=[],filter='all';
async function load(){const[t,c]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);TOOLS=t.tools;CATS=c.categories;render()}
function chips(){const all=[{id:'all',name:'ALL'},...CATS.map(c=>({id:c.id,name:c.name}))];const counts={all:TOOLS.length};CATS.forEach(c=>counts[c.id]=TOOLS.filter(t=>t.category===c.id).length);document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===filter?'on':''}" data-id="${c.id}">${c.name}<span class="n">[${counts[c.id]||0}]</span></button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{filter=b.dataset.id;render()})}
function card(t){return `<a class="card ${t.is_mine?'mine':''}" href="${esc(t.url)}" target="_blank" rel="noopener"><div class="row"><div><div class="nm">${esc(t.name)}</div><div class="by">${esc(t.by)}</div></div><span class="free">${esc(t.free)}</span></div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}<div class="tags">${t.tags.map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div></a>`}
function render(){chips();const f=t=>filter==='all'||t.category===filter;const cur=TOOLS.filter(t=>!t.is_mine&&f(t));const mine=TOOLS.filter(t=>t.is_mine&&f(t));document.getElementById('curated').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mine.map(card).join('');document.getElementById('c-count').textContent=`[${cur.length}]`;document.getElementById('m-count').textContent=`[${mine.length}]`}
load();
</script></body></html>
