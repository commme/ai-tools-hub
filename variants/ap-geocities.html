<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AP · Y2K Geocities</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}@import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
body{background:#000 url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='4' height='4'><rect width='4' height='4' fill='%23000'/><circle cx='2' cy='2' r='.5' fill='%2300ff00'/></svg>");color:#ffff00;font-family:'Comic Neue','Pretendard',cursive;min-height:100vh;font-size:15px}
.wrap{max-width:800px;margin:0 auto;padding:24px;background:#000;border:4px ridge #00ffff}
header{background:linear-gradient(90deg,#ff00ff,#00ffff,#ffff00,#00ff00);padding:16px;text-align:center;margin-bottom:20px;border:3px inset #fff}
h1{color:#000;font-size:clamp(32px,6vw,56px);font-weight:700;text-shadow:2px 2px 0 #fff;font-style:italic}
h1::before{content:'★彡 '}
h1::after{content:' 彡★'}
.sub{color:#fff;font-size:16px;margin-top:8px;font-weight:700;text-shadow:1px 1px 0 #000}
.marquee{background:#ff00ff;color:#ffff00;padding:6px;text-align:center;border:2px solid #ffff00;margin-bottom:16px;font-weight:700;animation:blink 1s infinite}
@keyframes blink{50%{opacity:.5}}
.chips{text-align:center;margin:20px 0;padding:12px;background:#00008b;border:3px ridge #00ffff}
.chip{padding:4px 10px;background:#ff00ff;border:2px outset #fff;color:#ffff00;font:inherit;font-weight:700;cursor:pointer;margin:2px;font-size:13px}
.chip.on{background:#00ff00;color:#000;border-style:inset}
.section{text-align:center;margin:24px 0 12px;padding:10px;background:#8b008b;color:#ffff00;font-size:22px;font-weight:700;border:3px ridge #ff00ff;text-shadow:2px 2px 0 #000}
.section::before{content:'✧･ﾟ '}
.section::after{content:' ･ﾟ✧'}
.grid{display:flex;flex-direction:column;gap:12px}
.card{background:#000080;border:3px ridge #00ffff;padding:12px;text-decoration:none;color:#ffff00;display:block}
.card:hover{background:#8b008b;border-style:inset}
.row{display:flex;justify-content:space-between;align-items:start;margin-bottom:4px}
.nm{font-size:20px;font-weight:700;color:#00ffff;text-shadow:1px 1px 0 #000}
.nm::before{content:'🌟 '}
.by{color:#ff00ff;font-size:12px;font-weight:700;margin-bottom:6px}
.desc{color:#fff;font-size:14px;line-height:1.4}
.free{font-size:11px;padding:2px 8px;background:#00ff00;color:#000;font-weight:700;border:1px outset #fff}
.note{margin-top:6px;padding:6px;background:#ffff00;color:#000;font-weight:700;font-size:12px;border:2px dotted #ff00ff}
.note::before{content:'💾 '}
.counter{text-align:center;margin-top:24px;color:#00ff00;font-size:12px;font-weight:700;background:#000;border:2px ridge #00ffff;padding:8px}</style></head><body>
<div class="wrap"><div class="marquee">⚡ WELCOME TO AI TOOLS HUB ⚡ BEST VIEWED IN 800x600 ⚡</div><header><h1>매일 쓰는 AI 도구</h1><p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들.</p></header>
<div class="chips" id="chips"></div>
<div class="section">Curated · <span id="cn"></span></div>
<div class="grid" id="cur"></div>
<div class="section">Mine · <span id="mn"></span></div>
<div class="grid" id="mine"></div><div class="counter">VISITORS: 00013337 · LAST UPDATED: 2026年</div></div>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}</a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
