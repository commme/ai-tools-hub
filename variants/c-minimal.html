<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>C · 일본 미니멀</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#fff;--ink:#1a1a1a;--mute:#888;--line:#e8e6e0;--accent:#c8483a}
  html,body{background:var(--bg);color:var(--ink);font-family:'Pretendard',sans-serif;min-height:100vh;font-weight:300}
  .wrap{max-width:1100px;margin:0 auto;padding:120px 40px 160px}
  .num{font-family:'Noto Sans Mono',monospace;font-size:11px;color:var(--mute);letter-spacing:.2em;margin-bottom:60px}
  h1{font-family:'Noto Serif JP',serif;font-size:clamp(40px,6vw,72px);font-weight:300;line-height:1.3;letter-spacing:-.01em;margin-bottom:24px}
  h1 em{font-style:normal;color:var(--accent);font-weight:400}
  .sub{color:var(--mute);font-size:15px;line-height:1.9;max-width:540px;font-weight:400}
  .divider{height:1px;background:var(--line);margin:80px 0 40px}
  .controls{display:flex;gap:28px;margin-bottom:60px;flex-wrap:wrap;font-family:'Noto Sans Mono',monospace}
  .chip{background:none;border:none;color:var(--mute);font-size:13px;cursor:pointer;padding:0;font-family:inherit;letter-spacing:.05em;transition:color .2s;border-bottom:1px solid transparent;padding-bottom:4px}
  .chip:hover{color:var(--ink)}
  .chip.on{color:var(--accent);border-bottom-color:var(--accent)}
  .chip .n{font-size:10px;opacity:.5;margin-left:4px}
  .section-h{font-family:'Noto Serif JP',serif;font-size:13px;color:var(--mute);letter-spacing:.3em;text-transform:uppercase;margin:80px 0 32px;font-weight:400}
  .section-h:first-of-type{margin-top:0}
  .list{display:flex;flex-direction:column}
  .item{display:grid;grid-template-columns:60px 1fr auto;gap:32px;align-items:start;padding:32px 0;border-bottom:1px solid var(--line);text-decoration:none;color:inherit;transition:background .2s;padding-left:8px;padding-right:8px;margin-left:-8px;margin-right:-8px}
  .item:hover{background:#fafaf7}
  .idx{font-family:'Noto Sans Mono',monospace;font-size:11px;color:var(--mute);padding-top:4px;letter-spacing:.1em}
  .body .nm{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:400;letter-spacing:-.01em;margin-bottom:6px}
  .body .by{font-family:'Noto Sans Mono',monospace;font-size:11px;color:var(--mute);margin-bottom:14px;letter-spacing:.05em}
  .body .desc{font-size:14px;line-height:1.75;color:#444;max-width:640px;margin-bottom:14px}
  .body .note{font-family:'Noto Serif JP',serif;font-style:italic;color:var(--accent);font-size:13.5px;line-height:1.6;border-left:1px solid var(--accent);padding-left:14px;margin:14px 0;font-weight:400}
  .body .tags{display:flex;gap:14px;flex-wrap:wrap;font-family:'Noto Sans Mono',monospace;font-size:11px;color:var(--mute)}
  .body .tags span::before{content:'#'}
  .meta{text-align:right;font-family:'Noto Sans Mono',monospace;font-size:11px;color:var(--mute);padding-top:6px;letter-spacing:.05em;white-space:nowrap}
  .meta .free{display:block;color:var(--ink);margin-bottom:6px}
  footer{margin-top:120px;font-family:'Noto Sans Mono',monospace;font-size:11px;color:var(--mute);text-align:center;letter-spacing:.2em}
  @media (max-width:640px){.item{grid-template-columns:1fr}.idx,.meta{text-align:left}}
</style>
</head>
<body>
<main class="wrap">
  <div class="num">— 二〇二六 · 春</div>
  <h1>매일 쓰는<br><em>AI 도구</em>를 정리합니다</h1>
  <p class="sub">한국에서 실제로 많이 쓰는 도구와<br>직접 만든 작은 도구들을 모았습니다.<br>과장 없이, 기능 그대로.</p>
  <div class="divider"></div>
  <div class="controls" id="chips"></div>
  <div class="section-h">큐레이션 한 도구 — <span id="c-count"></span></div>
  <div class="list" id="curated"></div>
  <div class="section-h">내가 만든 도구 — <span id="m-count"></span></div>
  <div class="list" id="mine"></div>
  <footer>commme · 二〇二六</footer>
</main>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOOLS=[],CATS=[],filter='all';
async function load(){
  const [t,c]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);
  TOOLS=t.tools;CATS=c.categories;render();
}
function chips(){
  const all=[{id:'all',name:'전체'},...CATS];
  const counts={all:TOOLS.length};CATS.forEach(c=>counts[c.id]=TOOLS.filter(t=>t.category===c.id).length);
  document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===filter?'on':''}" data-id="${c.id}">${c.name}<span class="n">${counts[c.id]||0}</span></button>`).join('');
  document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{filter=b.dataset.id;render()});
}
function item(t,i){
  const idx=String(i+1).padStart(2,'0');
  return `<a class="item" href="${esc(t.url)}" target="_blank" rel="noopener">
    <div class="idx">${idx}</div>
    <div class="body">
      <div class="nm">${esc(t.name)}</div>
      <div class="by">${esc(t.by)}</div>
      <div class="desc">${esc(t.description)}</div>
      ${t.my_note?`<div class="note">「${esc(t.my_note)}」</div>`:''}
      <div class="tags">${t.tags.map(x=>`<span>${esc(x)}</span>`).join('')}</div>
    </div>
    <div class="meta"><span class="free">${esc(t.free)}</span>↗</div>
  </a>`;
}
function render(){
  chips();
  const f=t=>filter==='all'||t.category===filter;
  const cur=TOOLS.filter(t=>!t.is_mine&&f(t));
  const mine=TOOLS.filter(t=>t.is_mine&&f(t));
  document.getElementById('curated').innerHTML=cur.map(item).join('');
  document.getElementById('mine').innerHTML=mine.map(item).join('');
  document.getElementById('c-count').textContent=cur.length;
  document.getElementById('m-count').textContent=mine.length;
}
load();
</script>
</body>
</html>
