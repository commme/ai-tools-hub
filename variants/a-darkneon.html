<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>A · 다크 네온 글래스</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0f;--card:#11121a;--border:#1f2030;--text:#e7e7f0;--mute:#7d7f95;--cyan:#22d3ee;--mag:#ec4899}
  html,body{background:var(--bg);color:var(--text);font-family:'Pretendard','Inter',sans-serif;min-height:100vh;overflow-x:hidden}
  .glow{position:fixed;inset:0;pointer-events:none;background:
    radial-gradient(800px 600px at 15% 20%,rgba(34,211,238,.18),transparent 60%),
    radial-gradient(700px 500px at 85% 80%,rgba(236,72,153,.16),transparent 60%);z-index:0}
  .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:60px 60px;z-index:0;pointer-events:none}
  .wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:80px 32px 120px}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.3em;color:var(--cyan);text-transform:uppercase;margin-bottom:20px}
  h1{font-size:clamp(48px,7vw,88px);font-weight:900;line-height:1;letter-spacing:-.03em;margin-bottom:18px;background:linear-gradient(135deg,#fff 0%,var(--cyan) 60%,var(--mag) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{color:var(--mute);font-size:17px;max-width:560px;line-height:1.6}
  .controls{display:flex;gap:12px;margin:48px 0 16px;flex-wrap:wrap}
  .chip{padding:10px 18px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.02);color:var(--mute);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
  .chip:hover{border-color:var(--cyan);color:var(--text)}
  .chip.on{background:linear-gradient(135deg,var(--cyan),var(--mag));color:#000;border-color:transparent;font-weight:700}
  .chip .n{opacity:.6;margin-left:6px;font-family:'JetBrains Mono',monospace;font-size:11px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:32px}
  .card{position:relative;padding:24px;background:var(--card);border:1px solid var(--border);border-radius:18px;text-decoration:none;color:inherit;transition:all .25s;overflow:hidden}
  .card::before{content:"";position:absolute;inset:-1px;border-radius:18px;padding:1px;background:linear-gradient(135deg,var(--cyan),var(--mag));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .25s;pointer-events:none}
  .card:hover{transform:translateY(-3px);background:#15161f}
  .card:hover::before{opacity:1}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .ic{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--cyan),var(--mag));display:grid;place-items:center;font-weight:900;color:#000;font-family:'JetBrains Mono',monospace}
  .nm{font-size:17px;font-weight:700;letter-spacing:-.01em}
  .by{font-size:11px;color:var(--mute);font-family:'JetBrains Mono',monospace}
  .desc{font-size:13.5px;color:#b8bacc;line-height:1.55;margin-bottom:14px}
  .note{font-size:12.5px;color:var(--cyan);padding:10px 12px;background:rgba(34,211,238,.06);border-left:2px solid var(--cyan);border-radius:0 6px 6px 0;margin-bottom:14px;font-style:italic}
  .tags{display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:10.5px;padding:3px 8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;color:var(--mute);font-family:'JetBrains Mono',monospace}
  .free{position:absolute;top:18px;right:18px;font-size:10px;padding:3px 8px;border-radius:5px;background:rgba(34,211,238,.12);color:var(--cyan);font-family:'JetBrains Mono',monospace;border:1px solid rgba(34,211,238,.2)}
  .mine .ic{background:linear-gradient(135deg,#ddff00,#22d3ee)}
  .section-h{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.3em;color:var(--mute);text-transform:uppercase;margin:64px 0 16px;display:flex;align-items:center;gap:14px}
  .section-h::after{content:"";flex:1;height:1px;background:var(--border)}
  footer{margin-top:80px;padding-top:32px;border-top:1px solid var(--border);text-align:center;color:var(--mute);font-size:12px;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div class="glow"></div>
<div class="grid-bg"></div>
<main class="wrap">
  <div class="eyebrow">// AI · TOOLS · 2026</div>
  <h1>매일 쓰는<br>AI 도구 모음</h1>
  <p class="sub">한국에서 실제로 많이 쓰는 AI 도구 + 직접 만든 것들. 과장 없이, 기능 그대로.</p>
  <div class="controls" id="chips"></div>
  <div class="section-h">CURATED <span id="c-count"></span></div>
  <div class="grid" id="curated"></div>
  <div class="section-h">MADE BY ME <span id="m-count"></span></div>
  <div class="grid" id="mine"></div>
  <footer>commme · 2026</footer>
</main>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOOLS=[],CATS=[],filter='all';
async function load(){
  const [t,c]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);
  TOOLS=t.tools;CATS=c.categories;render();
}
function chips(){
  const all=[{id:'all',name:'전체',emoji:''},...CATS];
  const counts={all:TOOLS.length};CATS.forEach(c=>counts[c.id]=TOOLS.filter(t=>t.category===c.id).length);
  document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===filter?'on':''}" data-id="${c.id}">${c.emoji} ${c.name}<span class="n">${counts[c.id]||0}</span></button>`).join('');
  document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{filter=b.dataset.id;render()});
}
function card(t){
  return `<a class="card ${t.is_mine?'mine':''}" href="${esc(t.url)}" target="_blank" rel="noopener">
    <span class="free">${esc(t.free)}</span>
    <div class="row"><div class="ic">${esc(t.name[0])}</div><div><div class="nm">${esc(t.name)}</div><div class="by">${esc(t.by)}</div></div></div>
    <div class="desc">${esc(t.description)}</div>
    ${t.my_note?`<div class="note">"${esc(t.my_note)}"</div>`:''}
    <div class="tags">${t.tags.map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>
  </a>`;
}
function render(){
  chips();
  const f=t=>filter==='all'||t.category===filter;
  const cur=TOOLS.filter(t=>!t.is_mine&&f(t));
  const mine=TOOLS.filter(t=>t.is_mine&&f(t));
  document.getElementById('curated').innerHTML=cur.map(card).join('');
  document.getElementById('mine').innerHTML=mine.map(card).join('');
  document.getElementById('c-count').textContent=`(${cur.length})`;
  document.getElementById('m-count').textContent=`(${mine.length})`;
}
load();
</script>
</body>
</html>
