<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>AM · Risograph</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f0e8;color:#2a2a2a;font-family:'Pretendard',sans-serif;min-height:100vh;background-image:radial-gradient(circle,#00000012 1px,transparent 1px);background-size:4px 4px}
.wrap{max-width:1100px;margin:0 auto;padding:60px 24px 120px}
header{margin-bottom:48px}
h1{font-size:clamp(56px,10vw,128px);font-weight:900;line-height:.9;letter-spacing:-.04em;color:#d94f4f;mix-blend-mode:multiply;text-shadow:4px 4px 0 #4a90d9}
.sub{margin-top:20px;font-size:17px;max-width:540px;font-weight:600;color:#2a2a2a}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:32px 0}
.chip{padding:8px 14px;background:transparent;border:2px solid #2a2a2a;color:#2a2a2a;font:inherit;font-size:13px;font-weight:700;cursor:pointer;border-radius:4px;mix-blend-mode:multiply}
.chip.on{background:#d94f4f;color:#f5f0e8;border-color:#d94f4f}
.section{font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.15em;margin:48px 0 20px;color:#4a90d9;mix-blend-mode:multiply;border-bottom:3px dashed #4a90d9;padding-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px}
.card{background:#fff;border:2px solid #2a2a2a;padding:22px;text-decoration:none;color:#2a2a2a;display:block;position:relative;mix-blend-mode:multiply;box-shadow:4px 4px 0 #d94f4f,8px 8px 0 #4a90d9}
.card:hover{box-shadow:6px 6px 0 #d94f4f,12px 12px 0 #4a90d9}
.row{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px}
.nm{font-size:22px;font-weight:900;letter-spacing:-.02em;color:#d94f4f}
.by{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#4a90d9;margin-bottom:12px}
.desc{font-size:14px;line-height:1.5;font-weight:500}
.free{font-size:10px;padding:3px 8px;background:#4a90d9;color:#fff;font-weight:700;text-transform:uppercase}
.note{margin-top:8px;padding:8px;background:#ffd60a;font-size:12px;font-weight:600;color:#2a2a2a}</style></head><body>
<div class="wrap"><header><h1>매일 쓰는 AI 도구</h1><p class="sub">한국에서 실제로 많이 쓰는 도구 + 직접 만든 작은 도구들.</p></header>
<div class="chips" id="chips"></div>
<div class="section">Curated · <span id="cn"></span></div>
<div class="grid" id="cur"></div>
<div class="section">Mine · <span id="mn"></span></div>
<div class="grid" id="mine"></div></div>
<script>
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let T=[],C=[],f='all';
async function load(){const[a,b]=await Promise.all([fetch('../tools.json').then(r=>r.json()),fetch('../categories.json').then(r=>r.json())]);T=a.tools;C=b.categories;render()}
function chips(){const all=[{id:'all',name:'All'},...C];document.getElementById('chips').innerHTML=all.map(c=>`<button class="chip ${c.id===f?'on':''}" data-id="${c.id}">${c.name}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{f=b.dataset.id;render()})}
function card(t){return `<a class="card" href="${esc(t.url)}" target="_blank"><div class="row"><div class="nm">${esc(t.name)}</div><span class="free">${esc(t.free)}</span></div><div class="by">${esc(t.by)}</div><div class="desc">${esc(t.description)}</div>${t.my_note?`<div class="note">${esc(t.my_note)}</div>`:''}</a>`}
function render(){chips();const ff=t=>f==='all'||t.category===f;const cur=T.filter(t=>!t.is_mine&&ff(t));const mn=T.filter(t=>t.is_mine&&ff(t));document.getElementById('cur').innerHTML=cur.map(card).join('');document.getElementById('mine').innerHTML=mn.map(card).join('');document.getElementById('cn').textContent=cur.length;document.getElementById('mn').textContent=mn.length}
load();
</script>
</body></html>
